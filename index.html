<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>未提出博覧会</title>
  <meta name="description" content="まだ何者にもなっていない人、入場無料。スマホで遊べる物語謎解きゲーム。" />
  <style>
    :root{
      --ink:#fff2d7;
      --ink2:#d9c9a8;
      --ok:#b6e6aa;
      --ng:#ffafa6;
      --glow:0 0 6px rgba(255,245,222,.9), 0 0 22px rgba(255,223,170,.42);
    }

    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 22%, rgba(255,230,174,.12), transparent 22rem),
        radial-gradient(circle at 18% 82%, rgba(130,96,52,.12), transparent 22rem),
        linear-gradient(180deg,#070708 0%,#020203 100%);
      font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
      line-height:1.9;
      letter-spacing:.08em;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,.08), transparent 1px),
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size:2px 2px,46px 46px,46px 46px;
      opacity:.48;
      mix-blend-mode:screen;
      z-index:0;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle, transparent 40%, rgba(0,0,0,.62) 100%);
      z-index:0;
    }

    button,input{font:inherit;letter-spacing:.08em}
    button{-webkit-tap-highlight-color:transparent}

    .app{
      width:min(100%,680px);
      min-height:100dvh;
      margin:0 auto;
      padding:18px 18px 38px;
      position:relative;
      z-index:1;
    }

    #view{animation:fade .35s ease both}
    @keyframes fade{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }

    .center{
      min-height:calc(100dvh - 36px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .title-box{
      width:min(78vw,360px);
      aspect-ratio:1.23/1;
      border:2px solid rgba(255,245,222,.92);
      box-shadow:var(--glow), inset 0 0 22px rgba(255,238,202,.08);
      display:grid;
      place-items:center;
      margin:0 auto 26px;
      padding:16px 14px;
    }
    .title-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 22px;
      font-size:clamp(3rem,14vw,5.6rem);
      line-height:.95;
      font-weight:700;
      text-shadow:var(--glow);
    }
    .copy{
      margin:0 0 36px;
      color:var(--ink);
      font-size:clamp(.9rem,3.6vw,1.08rem);
      text-shadow:0 0 10px rgba(255,245,222,.8),0 0 20px rgba(255,226,174,.22);
      letter-spacing:.055em;
    }

    .primary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      border:1px solid rgba(255,245,222,.88);
      color:var(--ink);
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:15px 28px;
      text-decoration:none;
      text-shadow:var(--glow);
      box-shadow:var(--glow), inset 0 0 20px rgba(255,238,202,.04);
      cursor:pointer;
    }
    .primary:active,.btn:active{transform:scale(.985)}

    .page{
      min-height:calc(100dvh - 36px);
      padding:28px 8px 32px;
    }

    .label{
      width:max-content;
      margin:0 auto 20px;
      border:1px solid rgba(255,245,222,.72);
      padding:4px 24px;
      color:var(--ink);
      text-shadow:var(--glow);
      box-shadow:0 0 16px rgba(255,230,174,.12);
      font-size:1.05rem;
      line-height:1.6;
    }

    h1,h2,h3,p{margin-top:0}
    .heading{
      text-align:center;
      margin:0 0 34px;
      font-size:clamp(2rem,9vw,3.3rem);
      font-weight:500;
      line-height:1.25;
      color:var(--ink);
      text-shadow:var(--glow);
      letter-spacing:.14em;
    }
    .heading::after{
      content:"";
      display:block;
      width:140px;
      height:1px;
      margin:18px auto 0;
      background:linear-gradient(90deg, transparent, rgba(255,238,202,.78), transparent);
      box-shadow:var(--glow);
    }

    .text{
      font-size:clamp(.98rem,4.1vw,1.08rem);
      color:var(--ink);
      text-shadow:0 0 8px rgba(255,245,222,.5);
      max-width:560px;
      margin:0 auto 28px;
    }
    .text p{margin:0 0 1.02em}

    .quote-box{
      max-width:560px;
      margin:26px auto;
      border:1px solid rgba(255,245,222,.66);
      padding:18px 14px;
      text-align:center;
      color:var(--ink);
      text-shadow:var(--glow);
      box-shadow:0 0 20px rgba(255,230,174,.13), inset 0 0 16px rgba(255,238,202,.03);
      background:rgba(255,238,202,.025);
      font-size:clamp(1.08rem,4.9vw,1.45rem);
      letter-spacing:.13em;
    }

    .bracket{
      max-width:560px;
      margin:28px auto;
      padding:18px 24px;
      position:relative;
      text-align:center;
      color:var(--ink);
      text-shadow:var(--glow);
    }
    .bracket::before,.bracket::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:18px;
      border-color:rgba(255,245,222,.8);
      box-shadow:var(--glow);
    }
    .bracket::before{
      left:0;
      border-left:2px solid;
      border-top:2px solid;
      border-bottom:2px solid;
    }
    .bracket::after{
      right:0;
      border-right:2px solid;
      border-top:2px solid;
      border-bottom:2px solid;
    }

    .divider-title{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      color:var(--ink2);
      text-shadow:var(--glow);
      margin:28px auto 14px;
      max-width:560px;
    }
    .divider-title::before,.divider-title::after{
      content:"";
      height:1px;
      flex:1;
      background:linear-gradient(90deg, transparent, rgba(255,238,202,.45));
      box-shadow:0 0 8px rgba(255,230,174,.18);
    }
    .divider-title::after{
      background:linear-gradient(90deg, rgba(255,238,202,.45), transparent);
    }

    .clue{
      max-width:560px;
      margin:0 auto 22px;
      border:1px solid rgba(255,245,222,.72);
      box-shadow:var(--glow), inset 0 0 16px rgba(255,238,202,.03);
      background:rgba(255,255,255,.018);
      text-align:center;
      color:var(--ink);
      text-shadow:var(--glow);
      font-size:clamp(1.02rem,4.5vw,1.36rem);
      line-height:2.08;
      padding:12px 12px;
    }
    .clue .line + .line{border-top:1px solid rgba(255,238,202,.23)}

    .instruction{
      max-width:560px;
      margin:0 auto 18px;
      text-align:center;
      color:var(--ink2);
      text-shadow:0 0 8px rgba(255,238,202,.35);
      font-size:.95rem;
    }

    .input{
      width:100%;
      max-width:560px;
      display:block;
      margin:0 auto 14px;
      border:1px solid rgba(255,245,222,.62);
      background:rgba(0,0,0,.2);
      color:var(--ink);
      border-radius:0;
      padding:15px 16px;
      outline:none;
      box-shadow:0 0 14px rgba(255,230,174,.08), inset 0 0 18px rgba(255,238,202,.025);
      font-size:1rem;
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      letter-spacing:.04em;
    }
    .input::placeholder{color:rgba(255,238,202,.42)}

    .buttons{
      max-width:560px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .btn{
      border:1px solid rgba(255,245,222,.66);
      color:var(--ink);
      background:rgba(255,255,255,.018);
      padding:12px 10px;
      box-shadow:0 0 14px rgba(255,230,174,.1), inset 0 0 14px rgba(255,238,202,.025);
      text-shadow:var(--glow);
      cursor:pointer;
    }
    .btn.full{grid-column:1 / -1}

    .msg{
      max-width:560px;
      margin:14px auto 0;
      min-height:1.6em;
      font-weight:600;
      text-align:center;
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      letter-spacing:.04em;
    }
    .msg.ok{color:var(--ok); text-shadow:0 0 12px rgba(182,230,170,.3)}
    .msg.ng{color:var(--ng); text-shadow:0 0 12px rgba(255,175,166,.25)}

    .hint{
      display:none;
      max-width:560px;
      margin:16px auto 0;
      color:var(--ink2);
      border:1px solid rgba(255,245,222,.24);
      background:rgba(255,238,202,.035);
      padding:14px 14px;
      font-size:.88rem;
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      letter-spacing:.04em;
    }

    .collected{
      max-width:430px;
      margin:20px auto 28px;
      border:1px solid rgba(255,245,222,.38);
      box-shadow:0 0 16px rgba(255,230,174,.08);
    }
    .row{
      display:grid;
      grid-template-columns:60px 1fr;
      align-items:center;
      min-height:48px;
      border-bottom:1px solid rgba(255,245,222,.16);
      color:var(--ink);
      text-shadow:var(--glow);
      font-size:1.12rem;
    }
    .row:last-child{border-bottom:0}
    .num{
      text-align:center;
      border-right:1px solid rgba(255,245,222,.18);
      color:var(--ink2);
    }
    .word{padding-left:24px}

    .count{
      text-align:center;
      color:var(--ink2);
      font-size:.95rem;
      margin:30px auto 0;
      text-shadow:0 0 10px rgba(255,238,202,.3);
    }
    .count::before,.count::after{
      content:"";
      display:inline-block;
      width:52px;
      height:1px;
      vertical-align:middle;
      margin:0 16px;
      background:linear-gradient(90deg, transparent, rgba(255,238,202,.45));
    }
    .count::after{background:linear-gradient(90deg, rgba(255,238,202,.45), transparent)}

    .stamp{
      display:inline-block;
      margin:10px 0 0;
      border:2px solid rgba(182,230,170,.7);
      color:var(--ok);
      padding:4px 12px;
      transform:rotate(-4deg);
      text-shadow:0 0 10px rgba(182,230,170,.25);
      box-shadow:0 0 14px rgba(182,230,170,.12);
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      font-weight:800;
      letter-spacing:.12em;
    }




    .crossword-note{
      max-width:560px;
      margin:0 auto 16px;
      text-align:center;
      color:var(--ink2);
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      font-size:.92rem;
      letter-spacing:.04em;
      text-shadow:0 0 10px rgba(255,238,202,.35);
    }
    .crossword{
      width:max-content;
      max-width:100%;
      margin:10px auto 22px;
      display:grid;
      gap:6px;
      justify-content:center;
      padding:20px 12px;
      border:1px solid rgba(255,245,222,.20);
      box-shadow:0 0 28px rgba(255,230,174,.16), inset 0 0 28px rgba(255,238,202,.025);
      background:rgba(255,238,202,.018);
    }
    .cw-row{
      display:flex;
      justify-content:center;
      gap:6px;
    }
    .cw-cell{
      width:38px;
      height:38px;
      border:1px solid rgba(255,245,222,.42);
      display:grid;
      place-items:center;
      color:transparent;
      box-shadow:0 0 10px rgba(255,230,174,.08), inset 0 0 10px rgba(255,238,202,.02);
      background:rgba(255,255,255,.01);
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      position:relative;
    }
    .cw-cell.empty{
      border-color:transparent;
      box-shadow:none;
      background:transparent;
    }
    .cw-cell.key{
      border-color:rgba(255,250,230,.98);
      background:rgba(255,238,202,.18);
      box-shadow:
        0 0 10px rgba(255,245,222,.95),
        0 0 28px rgba(255,226,174,.72),
        0 0 52px rgba(255,210,145,.36),
        inset 0 0 18px rgba(255,238,202,.12);
    }
    .cw-clues{
      text-align:left;
      max-width:560px;
      margin:0 auto;
      font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      font-size:.94rem;
      line-height:1.85;
      color:var(--ink2);
      text-shadow:0 0 8px rgba(255,238,202,.30);
    }
    .cw-clues div{
      border-top:1px solid rgba(255,238,202,.14);
      padding:7px 4px;
    }

    @media (max-width:420px){
      .app{padding-left:14px;padding-right:14px}
      .page{padding-top:28px}
      .buttons{gap:10px}
      .btn{font-size:.94rem}
      .quote-box{font-size:1.02rem}
      .bracket{padding-left:18px;padding-right:18px}
      .heading{letter-spacing:.08em}
    }
  </style>
</head>

<body>
  <main class="app">
    <div id="view"></div>
  </main>

  <script>
    const view = document.getElementById("view");

    const introPages = [
      {label:"入口", heading:"招待券", body:`<p>夜、机の引き出しの奥から、見覚えのないチケットが出てきた。</p><p>コンビニのレシートや、もう使わないポイントカードや、なぜ取ってあるのかわからないボタン電池の袋にまぎれて、それは妙にきれいな顔をしていた。</p><p>少し厚い紙でできていて、端だけが古い本みたいに茶色くなっている。</p><div class="quote-box">『未提出博覧会　招待券』</div>`},
      {label:"入口", heading:"展示対象", body:`<p>身に覚えはなかった。</p><p>博覧会に行く予定もないし、そもそも未提出という言葉に招待される筋合いもない。</p><p>裏返すと、小さな文字があった。</p><div class="bracket">やらなかったことは、<br>失敗ではありません。<br>ただし、展示対象です。</div><p>かなり嫌な招待券だった。</p>`},
      {label:"入口", heading:"入口", body:`<p>捨てようとして、指が止まった。</p><p>たぶん、自分でも少しだけ分かっていた。見ないふりをしているものほど、ちゃんと名前がついている。</p><p>始めなかったこと。出さなかったもの。笑ってごまかした憧れ。まだ本気じゃないから、という便利な言い訳。</p><p>チケットを握ると、部屋の壁に細い切れ目が入った。</p>`},
      {label:"入口", heading:"入場無料", body:`<p>壁紙が静かにめくれて、そこに小さな入口が現れる。</p><p>入口の向こうは暗く、古い体育館の倉庫みたいな匂いがした。</p><p>ほこり、紙、鉄、少しだけ湿った木材。</p><p>ドアの上には、金色の文字でこう書かれている。</p><div class="quote-box">まだ何者にもなっていない人、入場無料。</div><p>失礼だな、と思った。</p><p>でも、入った。</p>`},
      {label:"受付", heading:"片目のだるま", body:`<p>受付には、片目だけ黒く塗られただるまが座っていた。座っていた、というより、置かれていた。でも口がある。かなり小さくて、態度は大きい。</p><p>「ようこそ、未提出博覧会へ」</p><p>「帰っていいですか」</p><p>「入場後の即時退館は可能です。ただし、未閲覧の展示は夢に出ます」</p><p>「脅し？」</p><p>「案内です」</p>`},
      {label:"受付", heading:"展示規約", body:`<p>だるまは、ころんと少しだけ揺れた。片方の目は白いままだった。</p><p>「ここには、失敗したものは展示されません」</p><p>「じゃあ何があるの」</p><p>「失敗する前にしまわれたものです」</p><p>その言い方が、少し嫌だった。</p><p>だるまは小さな閲覧証を差し出した。名前を書く欄は空白だった。</p><p>「六つの展示を閲覧してください。出口で必要になります」</p>`}
    ];

    const rooms = [
      {
        label:"第一展示室",
        heading:"箱",
        display:"箱",
        answer:"えんぴつ",
        before:[
          `<p>最初の展示室には、箱がひとつだけ置かれていた。</p><p>古い木箱で、ふたには小さな傷がいくつもある。開けようと思えば開けられそうなのに、なぜか誰も開けなかったような箱だった。</p>`,
          `<p>中には、未使用のノート、削られていない鉛筆、開封されなかった絵の具、買っただけのペン、最初のページだけ日付が書かれた手帳が入っている。</p><div class="bracket">始める前なら、まだ下手じゃない。<br>始める前なら、まだ負けていない。<br>だからこの箱は、ずっと閉じられていました。</div>`
        ],
        puzzleStory:`<p>箱の底には、言葉が交差した紙が入っていた。</p><p>五つの言葉をすべて埋めると、光るマスにだけ、別の名前が残るらしい。</p>`,
        quote:`リストの言葉をすべて埋めて、<br>光るマスだけを読んでください。`,
        clue:`<p class="crossword-note">どこに何が入るかは、<br>マスの形と交差する文字から考えてください。</p>
          <div class="crossword" aria-label="箱のクロスワード">
            <div class="cw-row">
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell key"></span>
            </div>
            <div class="cw-row">
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell key"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell key"></span>
            </div>
            <div class="cw-row">
              <span class="cw-cell key"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell"></span>
            </div>
            <div class="cw-row">
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell"></span>
            </div>
            <div class="cw-row">
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell"></span>
              <span class="cw-cell empty"></span>
              <span class="cw-cell empty"></span>
            </div>
          </div>
          <div class="cw-clues">
            <div>・映画をみるばしょ</div>
            <div>・夜になると街の灯りがともる</div>
            <div>・忘れないように固定して</div>
            <div>・最後の一撃</div>
            <div>・積み上げてお城をつくった</div>
          </div>`,
        hint:"入る言葉は「えいがかん」「がいとう」「ぴんどめ」「とどめ」「つみき」。光るマスだけを読むと、箱の中に入っていたものになります。",
        after:[
          `<p>答えを入力すると、箱のふたが少しだけ開いた。</p><p>中に入っていた鉛筆が一本、ころんと転がる。</p><div class="quote-box">閲覧済み</div>`,
          `<p>どこからか、受付のだるまの声が聞こえた。</p><p>「書かなかったものは、まだ消えていません。芯が少し丸くなっただけです」</p><p>少し腹が立った。でも、少しだけ安心もした。</p>`
        ]
      },
      {
        label:"第二展示室",
        heading:"自転車",
        display:"自転車",
        answer:"ぷらいど",
        before:[
          `<p>次の部屋は、夜の校庭みたいだった。</p><p>床には白いラインが引かれていて、真ん中に補助輪つきの自転車が一台置かれている。ハンドルには赤いリボンが結ばれていて、タイヤにはほこりがかぶっていた。</p>`,
          `<p>床には転んだ跡みたいな白い線がいくつも残っている。実際に転んだ跡ではない。転ぶ前に引き返した跡だ。</p><div class="bracket">転ぶのが怖かったのではありません。<br>転ぶところを見られるのが怖かったのです。</div>`
        ],
        puzzleStory:`<p>自転車のカゴには、小さなメモが入っていた。</p><p>紙の端は少し破れていて、何度か折りたたまれた跡がある。</p><div class="bracket">走るために必要だったものから、<br>あなたの捨てられなかったものを<br>拾ってください。</div>`,
        quote:`メモに残された言葉を読み、<br>必要だったものから拾ってください。`,
        clue:[
          "後ろのタイヤに一回、空気を入れる。",
          "暗い夜道の前方には、二つの石ころ。",
          "真ん中には、一人で座る。",
          "必要だったもの：ポンプ／ライト／サドル"
        ],
        hint:"「後ろ」「前方」「真ん中」と、「一回」「二つ」「一人」が拾う場所と数を示しているかもしれません。",
        after:[
          `<p>答えを入力すると、自転車のベルが小さく鳴った。</p><p>ちりん、という頼りない音だった。けれど、部屋の中では妙に響いた。</p>`,
          `<p>補助輪は外れなかった。タイヤも回らなかった。</p><p>でも、カゴの中のメモだけが、少し軽くなった気がした。</p><p>捨てたふりをしていたものは、まだちゃんと残っていた。</p>`
        ]
      },
      {
        label:"第三展示室",
        heading:"めがね",
        display:"めがね",
        answer:"めがね",
        before:[
          `<p>三つ目の展示室には、客席があった。</p><p>小さな劇場のように、黒い椅子が何列も並んでいる。けれど、人は座っていない。代わりに、椅子の上にはたくさんのめがねだけが置かれていた。</p>`,
          `<p>丸いめがね。細いめがね。度が強そうなめがね。レンズが少し曇っためがね。</p><p>どれも舞台の方を向いている。</p><div class="bracket">客席からなら、何にでもなれました。<br>でも、舞台に立たない限り、<br>自分の名前は呼ばれませんでした。</div>`
        ],
        puzzleStory:`<p>舞台の上には、三枚の札が置かれている。</p>`,
        quote:`めがねたちが見ていたものの、<br>最初の文字を読んでください。`,
        clue:["めをそらした客席","がんばる人の背中","ねたましい拍手"],
        hint:"三枚の札の最初の文字です。客席に置かれていたものになります。",
        after:[
          `<p>入力すると、客席のめがねが一斉にこちらを向いた気がした。</p><p>もちろん、めがねに顔はない。けれど、見られている感じがした。</p>`,
          `<p>舞台袖から、拍手の音が一回だけした。</p><p>ぱち。</p><p>ひとつだけだから、よけいに恥ずかしかった。</p>`
        ]
      },
      {
        label:"第四展示室",
        heading:"留守番電話",
        display:"留守番電話",
        answer:"るすばんでんわ",
        before:[
          `<p>四つ目の部屋は、夕方の家みたいだった。</p><p>カーテンは半分だけ閉まっていて、テレビはついているのに音がない。テーブルの上には冷めたココアが置いてある。</p>`,
          `<p>壁には古い留守番電話がかかっていた。赤いランプが点滅している。</p><div class="bracket">夢中な人を笑うのは簡単でした。<br>その人たちが、自分よりずっと勇敢だと<br>気づかないふりをして。</div>`
        ],
        puzzleStory:`<p>再生ボタンを押すと、七件のメッセージが流れた。</p>`,
        quote:`留守番電話の最初の音を<br>順番に拾ってください。`,
        clue:["るすにしています。まだ本気ではないので。","すきだったものは、もう子どもっぽいので。","ばんごうを消しました。かけ直さなくていいので。","でないまま、夜が終わりました。","んー、また今度にします。","わらってごまかしたので、大丈夫です。"],
        hint:"六件のメッセージの最初の音だけを続けてください。",
        after:[
          `<p>正解の表示が出ると、留守番電話の赤いランプが消えた。</p><p>部屋は急に静かになる。音のないテレビの中で、知らない誰かが笑っていた。</p>`,
          `<p>テーブルのココアに触れると、もう冷たかった。</p><p>でも、甘い匂いはまだ少し残っていた。</p>`
        ]
      },
      {
        label:"第五展示室",
        heading:"台本",
        display:"台本",
        answer:"だいほん",
        before:[
          `<p>五つ目の部屋には、小さな舞台があった。</p><p>幕は半分だけ開いていて、床の真ん中に古い台本が一冊落ちている。ページの端には、何度も折り直した跡があった。</p>`,
          `<p>台本には、消された台詞が多すぎた。言う予定だった言葉。言えなかった言葉。いい人の役を続けるために、飲み込んだ言葉。</p><div class="bracket">本音はありました。<br>でも、台詞にするほどではありませんでした。<br>言ってしまうと、役が終わるからです。</div>`
        ],
        puzzleStory:`<p>台本の余白には、三つのメモが残されている。</p>`,
        quote:`余白のメモの最初の文字を<br>読んでください。`,
        clue:["だいじな場面で黙った","いい人の役だけ選んだ","ほんとうの台詞は書けなかった"],
        hint:"三つのメモの頭文字です。舞台に落ちているものになります。",
        after:[
          `<p>答えを入力すると、台本のページが勝手に一枚めくれた。</p><p>そこには、たった一行だけ印刷されている。</p><div class="quote-box">言わなかったことも、消えたわけではない。</div>`,
          `<p>舞台の照明が少しだけ明るくなった。</p><p>けれど、誰も登場しない。まだ、出番の前みたいだった。</p>`
        ]
      },
      {
        label:"第六展示室",
        heading:"消しゴム",
        display:"消しゴム",
        answer:"けしごむ",
        before:[
          `<p>最後の展示室には、机がひとつだけあった。</p><p>机の上には、小さく丸くなった消しゴムが置かれている。角はもうなくて、白かったはずの表面は少し灰色になっていた。</p>`,
          `<p>まわりには、消しカスが雪みたいに散らばっている。けれど、紙はどこにもない。</p><div class="bracket">間違いを消したのではありません。<br>間違う前の線まで、消していました。<br>白紙は、とても安全でした。</div>`
        ],
        puzzleStory:`<p>机の上には、消し残しみたいな四つの言葉がある。</p>`,
        quote:`消し残しの最初の文字を<br>読んでください。`,
        clue:["けっきょく消した","しっぱいする前に消した","ごまかして白紙にした","むかった先まで消した"],
        hint:"四つの消し残しの頭文字です。机の上に置かれているものになります。",
        after:[
          `<p>正解すると、消しゴムの横に小さな線が一本だけ現れた。</p><p>消されずに残った、短い線だった。</p>`,
          `<p>それだけなのに、部屋の空気が少し変わった。</p><p>白紙のままより、ずっと怖くて、少しだけましだった。</p>`
        ]
      }
    ];

    const endingPages = [
      {label:"閲覧終了", heading:"はじめるだけ", body:`<p>あなたが合言葉を入力すると、提出箱のふたが静かに開いた。</p><p>中には、未使用のノートが一冊だけ入っていた。表紙には何も書かれていない。題名も、目標も、計画も、夢もない。</p><p>ただ、最初のページだけが開いている。</p>`},
      {label:"閲覧終了", heading:"最初の一行", body:`<p>ページの一番上に、薄い罫線が一本あった。</p><p>「これを出せばいいの？」</p><p>「はい」</p><p>「何を書けば？」</p><p>「何でも」</p><p>「何でもが一番困る」</p><p>「存じています」</p><p>だるまは、ころんと少し揺れた。</p><div class="bracket">何者かになる必要はありません。<br>提出物は、最初の一行だけです。</div>`},
      {label:"閲覧終了", heading:"提出物", body:`<p>箱。自転車。めがね。留守番電話。台本。消しゴム。</p><p>全部、どこかで自分を守っていた。</p><p>下手な自分を見ないために。転ぶところを見られないために。舞台に立たずに済むために。電話に出ずに済むために。本音を台詞にしないために。間違う前に消すために。</p><p>だから、嫌いにはなれなかった。</p><p>でも、もう少しだけ外に出してもいい気がした。</p>`},
      {label:"閲覧終了", heading:"はじめるだけ", body:`<p>あなたは、ノートの最初のページに小さく書いた。</p><div class="quote-box">はじめるだけ</div><p>書いた瞬間、何も起こらなかった。</p><p>ファンファーレも鳴らない。照明も変わらない。人生が急に始まるような音もしない。</p><p>ただ、提出箱が小さく音を立てて閉まった。</p><p>ことん。</p>`},
      {label:"閲覧終了", heading:"受理", body:`<p>だるまが言った。</p><p>「提出、受理しました」</p><p>「これで何か変わる？」</p><p>「たぶん、あまり」</p><p>「ひどい」</p><p>「でも、未提出ではなくなりました」</p><p>その言葉だけが、少し遅れて胸に届いた。</p>`},
      {label:"閲覧終了", heading:"CLEAR", body:`<p>たった一行。何の価値もないような、誰にも褒められないような、ただの一行。</p><p>それでも、何も出していなかった場所に、初めて何かを置いた。</p><p>出口の扉が開く。向こう側には、自分の部屋が見えた。机、引き出し、散らかったレシート、飲みかけの水。</p><p>何も変わっていない、いつもの部屋。</p><p>でも、未提出ではなくなった。</p><p>失敗できる場所まで、やっと来た気がした。</p><span class="stamp">CLEAR</span>`}
    ];

    let pageList = [];
    let pageIndex = 0;
    let onDone = null;
    let roomIndex = 0;

    function normalize(text){
      return (text || "").replace(/\s/g,"").replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0x60)).toLowerCase();
    }

    function setView(html){
      view.style.animation = "none";
      view.offsetHeight;
      view.innerHTML = html;
      view.style.animation = "";
      window.scrollTo(0,0);
    }

    function renderTitle(){
      setView(`
        <section class="center">
          <div class="title-box">
            <div class="title-grid" aria-label="未提出博覧会">
              <span>未</span><span>提</span>
              <span>出</span><span>博</span>
              <span>覧</span><span>会</span>
            </div>
          </div>
          <p class="copy">まだ何者にもなっていない人、入場無料。</p>
          <button class="primary" onclick="startGame()" type="button">はじめる</button>
        </section>
      `);
    }

    function showPages(pages, done, finalLabel="進む"){
      pageList = pages;
      pageIndex = 0;
      onDone = done;
      renderPage(finalLabel);
    }

    function renderPage(finalLabel="進む"){
      const p = pageList[pageIndex];
      const buttonText = pageIndex + 1 === pageList.length ? finalLabel : "次へ";
      setView(`
        <section class="page">
          <div class="label">${p.label}</div>
          <h2 class="heading">${p.heading}</h2>
          <div class="text">${p.body}</div>
          <button class="primary" onclick="nextPage()" type="button">${buttonText}</button>
          <div class="count">${pageIndex+1} / ${pageList.length}</div>
        </section>
      `);
    }

    function nextPage(){
      if(pageIndex + 1 < pageList.length){
        pageIndex++;
        renderPage(pageIndex + 1 === pageList.length ? "進む" : "次へ");
      }else if(onDone){
        onDone();
      }
    }

    function startGame(){
      roomIndex = 0;
      showPages(introPages, () => showRoomIntro(0), "入場する");
    }

    function showRoomIntro(index){
      roomIndex = index;
      const r = rooms[index];
      const pages = r.before.map((body, i) => ({
        label:r.label,
        heading:i === 0 ? r.heading : "展示説明",
        body
      }));
      showPages(pages, renderPuzzle, "謎を見る");
    }

    function renderPuzzle(){
      const r = rooms[roomIndex];
      setView(`
        <section class="page">
          <div class="label">${r.label}</div>
          <h2 class="heading">${r.heading}</h2>
          <div class="text">${r.puzzleStory}</div>
          <div class="bracket">${r.quote}</div>
          <div class="divider-title">手がかり</div>
          <div class="clue">${Array.isArray(r.clue) ? r.clue.map(line => `<div class="line">${line}</div>`).join("") : r.clue}</div>
          <p class="instruction">こたえはひらがなで入力してください。</p>
          <input class="input" id="answerInput" placeholder="こたえ" autocomplete="off" autocapitalize="off" />
          <div class="buttons">
            <button class="btn" onclick="checkAnswer()" type="button">送信する</button>
            <button class="btn" onclick="toggleHint()" type="button">ヒント</button>
          </div>
          <div class="hint" id="hintBox">${r.hint}</div>
          <div class="msg" id="answerMsg"></div>
        </section>
      `);
    }

    function toggleHint(){
      const hint = document.getElementById("hintBox");
      hint.style.display = hint.style.display === "block" ? "none" : "block";
    }

    function checkAnswer(){
      const r = rooms[roomIndex];
      const input = document.getElementById("answerInput");
      const msg = document.getElementById("answerMsg");
      if(normalize(input.value) === r.answer){
        msg.textContent = "正解。閲覧済みです。";
        msg.className = "msg ok";
        setTimeout(() => {
          const pages = r.after.map((body, i) => ({
            label:r.label,
            heading:i === 0 ? "閲覧済み" : "余韻",
            body
          }));
          showPages(pages, () => {
            if(roomIndex + 1 < rooms.length) showRoomIntro(roomIndex + 1);
            else renderFinal();
          }, "進む");
        }, 700);
      }else{
        msg.textContent = "まだ違うみたい。手がかりをもう一度見てみてください。";
        msg.className = "msg ng";
      }
    }

    function renderFinal(){
      setView(`
        <section class="page">
          <div class="label">出口</div>
          <h2 class="heading">出口前の提出箱</h2>
          <div class="text">
            <p>六つの展示を見終えると、最初の受付に戻っていた。</p>
            <p>片目のだるまは、同じ場所にいる。けれど、少しだけ表情が変わったように見えた。</p>
            <p>受付の横に、学校の職員室前にありそうな古い提出箱が置かれている。</p>
          </div>
          <div class="collected">
            ${rooms.map((r,i)=>`<div class="row"><div class="num">${i+1}</div><div class="word">${r.display}</div></div>`).join("")}
          </div>
          <div class="bracket">展示物の名前をひらがなにして、<br>最初の文字を順番に読んでください。</div>
          <p class="instruction">こたえはひらがなで入力してください。</p>
          <input class="input" id="finalInput" placeholder="さいごのこたえ" autocomplete="off" autocapitalize="off" />
          <div class="buttons">
            <button class="btn full" onclick="checkFinal()" type="button">提出する</button>
            <button class="btn full" onclick="toggleFinalHint()" type="button">ヒント</button>
          </div>
          <div class="hint" id="finalHint">箱、自転車、めがね、留守番電話、台本、消しゴム。ひらがなにして、最初の文字だけを読んでみてください。</div>
          <div class="msg" id="finalMsg"></div>
        </section>
      `);
    }

    function toggleFinalHint(){
      const hint = document.getElementById("finalHint");
      hint.style.display = hint.style.display === "block" ? "none" : "block";
    }

    function checkFinal(){
      const input = document.getElementById("finalInput");
      const msg = document.getElementById("finalMsg");
      if(normalize(input.value) === "はじめるだけ"){
        msg.textContent = "提出、受理しました。";
        msg.className = "msg ok";
        setTimeout(() => showPages(endingPages, renderTitle, "タイトルへ"), 750);
      }else{
        msg.textContent = "まだ出口は開かないみたい。六つの展示物をひらがなにして、最初の文字を見てください。";
        msg.className = "msg ng";
      }
    }

    renderTitle();

    document.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        if(document.getElementById("answerInput")) checkAnswer();
        if(document.getElementById("finalInput")) checkFinal();
      }
    });
  </script>
</body>
</html>
